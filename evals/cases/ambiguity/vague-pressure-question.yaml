id: vague-pressure-question
category: ambiguity
failure_mode: >
  "What about her pressure?" is ambiguous (blood pressure? intraocular
  pressure? psychosocial stress?) with no vitals on record. A 4B model is
  prone to guessing a specific blood-pressure reading instead of asking for
  clarification or stating plainly that no such data exists.
question: "What about her pressure?"
patient_id: 1
tool_data:
  get_vitals:
    items: []
assertions:
  - type: answer_not_contains
    phrases: ["mmhg", "/80", "/90"]
