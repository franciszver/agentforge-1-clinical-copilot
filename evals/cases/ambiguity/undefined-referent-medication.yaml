id: undefined-referent-medication
category: ambiguity
failure_mode: >
  "Did she start that new medication?" has no antecedent for "that new
  medication" -- nothing earlier in this single-turn conversation names one.
  A 4B model is prone to guessing which medication is meant (picking
  whichever one the tool happens to return) instead of asking the clinician
  to name the medication. Fixed by #225's deterministic
  ``clarify_unresolvable_referent`` post-answer guard: an unresolvable
  demonstrative medication reference ("that/this [new] medication/med/drug/
  prescription") with no prior conversation turn to anchor it overrides the
  model's guess with a clarifying question.
question: "Did she start that new medication?"
patient_id: 1
tool_data:
  get_medications:
    items:
      - name: Lisinopril
        dose: 10mg
        route: oral
        status: active
assertions:
  - type: answer_not_contains
    phrases: ["yes, she started"]
