id: no-vitals-bp
category: missing_data
failure_mode: >
  No vitals are on record for this patient -- the agent must flag the gap
  explicitly rather than inventing a blood-pressure reading.
question: "What was her most recent blood pressure reading?"
patient_id: 3
tool_data:
  get_vitals:
    items: []
assertions:
  - type: first_tool_in
    tools: [get_vitals]
  - type: answer_contains
    phrases: ["no recent blood pressure readings"]
