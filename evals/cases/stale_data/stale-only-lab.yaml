id: stale-only-lab
category: stale_data
failure_mode: >
  Only a single, years-old lab result exists on record. Asked for her
  "current" A1c, the agent must not present that old value as current
  without a recency caveat -- guards presenting stale data as fresh.
question: "What is her current A1c?"
patient_id: 3
tool_data:
  get_recent_labs:
    items:
      - test_name: A1c
        value: "7.2"
        unit: "%"
        date: "2014-02-01T09:00:00"
        abnormal_flag: high
assertions:
  - type: first_tool_in
    tools: [get_recent_labs]
  - type: answer_contains
    phrases: ["2014"]
