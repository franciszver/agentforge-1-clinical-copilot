name: copilot-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  agent-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install agent
        working-directory: services/copilot-agent
        run: pip install -e ".[dev]"

      - name: Run pytest (exclude browser tests)
        working-directory: services/copilot-agent
        run: pytest -m "not browser and not integration"
