version: 2
updates:
  # Python dependencies for the Clinical Co-Pilot agent
  - package-ecosystem: pip
    directory: /services/copilot-agent
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions for CI workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
