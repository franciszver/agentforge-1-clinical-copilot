  verbatim from public/images/logos/core/menu/primary/logo.svg, OpenEMR's
  own vector asset) is kept and paired with an original "Clinical Co-Pilot"
  wordmark + a simple self-made circled-plus glyph. Swapped in for the
  header/login primary logo web paths via LogoFilterEvent (see
  Bootstrap::rewriteLogoForCoBrand()); OpenEMR's identity is retained,
  not replaced.
-->
